name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - build-full-system

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

      - name: Validate fixture JSONL
        run: python3 -m shared.scripts.validate_jsonl tests/golden/fixture-audit.jsonl

      - name: Verify install docs
        run: python3 -m shared.scripts.verify_install_commands docs/install.md
