name: Claude Code Review

on:
  pull_request:
    # Run on PR creation only, not on every push or later PR state changes.
    types: [opened]

jobs:
  claude-review:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            After completing the review, post your findings IMMEDIATELY in this
            session, and do not rely on post-session comment capture:

            1. For each actionable inline finding, call
               mcp__github_inline_comment__create_inline_comment with
               confirmed: true so it posts at once rather than buffering.
            2. Always end by posting a single summary comment via
               `gh pr comment ${{ github.event.pull_request.number }} --body "..."`,
               including a brief verdict even when no actionable findings exist
               so reviewers see the run completed.
          claude_args: |
            --setting-sources user
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api repos/*),Bash(git fetch:*),Bash(git diff:*)"
